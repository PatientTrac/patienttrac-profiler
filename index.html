<!DOCTYPE html>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060e1c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="PatientTrac — Complete your patient profile securely before your visit." />
    <meta name="description:es" content="PatientTrac — Complete su perfil de paciente de forma segura antes de su visita." />
    <meta name="description:fr" content="PatientTrac — Complétez votre profil patient en toute sécurité avant votre visite." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap"

    />

    <title>PatientTrac · Patient Profile</title>

    <style>
      /* Prevent flash of unstyled content */
      html { background: #060e1c; }
      body { margin: 0; padding: 0; }
      * { box-sizing: border-box; }

      /* Mobile input zoom prevention */
      input, select, textarea {
        font-size: 16px !important;
      }

      /* Safe area insets for notched phones */
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
